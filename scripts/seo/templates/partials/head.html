{# ─── Common <head> partial for all programmatic pages ─── #}
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-SCW6VG50WX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-SCW6VG50WX');

  // CTA Click Tracking
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a[href*="fp_ref=ai"]');
    if (!link) return;
    gtag('event', 'cta_click', {
      event_category: 'affiliate',
      event_label: link.textContent.trim().substring(0, 100),
      page_section: (link.closest('section')  || {}).id || 'unknown',
      page_path: window.location.pathname
    });
  });

  // Scroll Depth Tracking
  (function() {
    var marks = [25, 50, 75, 90], fired = {};
    window.addEventListener('scroll', function() {
      var pct = Math.round(100 * (window.scrollY + window.innerHeight) / document.documentElement.scrollHeight);
      marks.forEach(function(m) {
        if (pct >= m && !fired[m]) {
          fired[m] = true;
          gtag('event', 'scroll_depth', { event_label: m + '%', page_path: window.location.pathname });
        }
      });
    });
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
<meta name="googlebot" content="index, follow">

<!-- Primary Meta -->
<title>{{ title }}</title>
<meta name="description" content="{{ description }}">
<meta name="author" content="Josh Miller">

<!-- Canonical -->
<link rel="canonical" href="{{ canonical_url }}">

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26A1;</text></svg>" type="image/svg+xml">

<!-- OpenGraph -->
<meta property="og:type" content="article">
<meta property="og:title" content="{{ og_title }}">
<meta property="og:description" content="{{ og_description }}">
<meta property="og:url" content="{{ canonical_url }}">
<meta property="og:site_name" content="highlevel.ai">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="https://www.highlevel.ai/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="article:published_time" content="{{ date_published }}T00:00:00Z">
<meta property="article:modified_time" content="{{ date_modified }}T00:00:00Z">
<meta property="article:author" content="Josh Miller">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ og_title }}">
<meta name="twitter:description" content="{{ og_description }}">
<meta name="twitter:image" content="https://www.highlevel.ai/og-image.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

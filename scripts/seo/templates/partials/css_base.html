{# ─── Complete CSS base partial — all shared styles from the site ─── #}
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-card: #16161f;
    --bg-card-hover: #1c1c28;
    --accent: #4f7df9;
    --accent-bright: #6b93ff;
    --accent-glow: rgba(79, 125, 249, 0.15);
    --accent-green: #34d399;
    --accent-orange: #fb923c;
    --accent-red: #ef4444;
    --text-primary: #f0f0f5;
    --text-secondary: #a5a5b8;
    --text-muted: #77778a;
    --border: rgba(255,255,255,0.06);
    --border-accent: rgba(79, 125, 249, 0.3);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; scroll-padding-top: 80px; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.7;
    font-size: 16px;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── AMBIENT BACKGROUND ─── */
  .ambient-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .ambient-bg::before {
    content: '';
    position: absolute;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(79,125,249,0.07) 0%, transparent 60%);
    animation: drift 20s ease-in-out infinite alternate;
  }
  .ambient-bg::after {
    content: '';
    position: absolute;
    bottom: -30%; right: -15%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(52,211,153,0.04) 0%, transparent 55%);
    animation: drift 25s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(80px, 40px); }
  }

  /* ─── LAYOUT ─── */
  .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 0;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }
  nav .container { display: flex; align-items: center; justify-content: space-between; }
  .nav-logo {
    font-family: 'Sora', sans-serif;
    font-weight: 900; font-size: 22px; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent-bright), var(--accent-green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    touch-action: manipulation;
    color: var(--text-secondary); text-decoration: none; font-size: 13px;
    font-weight: 500; transition: color 0.2s; white-space: nowrap;
  }
  .nav-links a:hover { color: var(--text-primary); }
  .nav-toggle {
    display: none; background: none; border: none; cursor: pointer;
    width: 32px; height: 32px; position: relative;
    flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  }
  .nav-toggle span {
    display: block; width: 22px; height: 2px; background: var(--text-primary);
    border-radius: 2px; transition: all 0.3s;
  }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 28px; border-radius: 50px; font-weight: 700;
    font-size: 15px; text-decoration: none; cursor: pointer;
    border: none; transition: all 0.25s ease;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #3a6af5);
    color: #fff;
    box-shadow: 0 4px 24px rgba(79,125,249,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(79,125,249,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.12);
  }
  .btn-nav {
    padding: 10px 22px; font-size: 13px;
    background: var(--accent); color: #fff; border-radius: 50px;
    text-decoration: none; font-weight: 600; transition: all 0.2s;
  }
  .btn-nav:hover { background: var(--accent-bright); transform: translateY(-1px); }

  /* ─── SECTION HEADERS ─── */
  .section-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .section-tag {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2.5px; color: var(--accent-bright);
    margin-bottom: 16px;
  }
  .section-header h2 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 800; letter-spacing: -1.5px;
    line-height: 1.15;
  }
  .section-header p {
    color: var(--text-secondary); font-size: 17px;
    max-width: 620px; margin: 16px auto 0;
  }

  /* ─── CONTENT BLOCKS (article-style) ─── */
  .content-block {
    max-width: 780px;
    margin: 0 auto;
    font-size: 16px;
    line-height: 1.8;
    color: var(--text-secondary);
  }
  .content-block p { margin-bottom: 20px; }
  .content-block h2 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(22px, 3vw, 30px); font-weight: 800;
    color: var(--text-primary);
    margin: 56px 0 20px;
    letter-spacing: -0.5px;
  }
  .content-block h3 {
    font-family: 'Sora', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--text-primary);
    margin: 40px 0 16px;
  }

  /* ─── SUMMARY BOX ─── */
  .summary-box {
    background: var(--bg-card);
    border: 1px solid var(--border-accent);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 40px;
  }
  .summary-box p {
    color: var(--text-secondary);
    font-size: 15px;
    line-height: 1.7;
  }

  /* ─── COMPARISON TABLE ─── */
  .compare-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .compare-table thead th {
    background: var(--bg-card);
    padding: 18px 20px;
    text-align: left;
    font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  .compare-table thead th:first-child { width: 28%; }
  .compare-table thead th.highlight {
    background: linear-gradient(180deg, rgba(79,125,249,0.12), var(--bg-card));
    color: var(--accent-bright);
    position: relative;
    padding-top: 38px;
  }
  .compare-table thead th.highlight::before {
    content: "EDITOR'S CHOICE";
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 4px 12px; border-radius: 0 0 8px 8px;
  }
  .compare-table tbody td {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px; color: var(--text-secondary);
    background: var(--bg-secondary);
  }
  .compare-table tbody td.highlight {
    background: rgba(79,125,249,0.03);
  }
  .compare-table tbody tr:last-child td { border-bottom: none; }
  .compare-table .feature-name { color: var(--text-primary); font-weight: 600; }
  .check { color: var(--accent-green); font-weight: 700; font-size: 18px; }
  .cross { color: #ef4444; font-size: 18px; }
  .partial { color: var(--accent-orange); font-size: 13px; font-weight: 600; }

  /* ─── CHECKLIST TABLE ─── */
  .checklist-table {
    width: 100%; max-width: 780px; margin: 0 auto;
    border-collapse: separate; border-spacing: 0;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .checklist-table thead th {
    background: var(--bg-card); padding: 14px 20px;
    text-align: left; font-family: 'Sora', sans-serif;
    font-size: 13px; font-weight: 700;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
  }
  .checklist-table tbody td {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    font-size: 14px; color: var(--text-secondary);
    background: var(--bg-secondary);
  }
  .checklist-table tbody tr:last-child td { border-bottom: none; }

  /* ─── CALC TABLE ─── */
  .calc-table {
    width: 100%; max-width: 780px; margin: 0 auto;
    border-collapse: separate; border-spacing: 0;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .calc-table thead th {
    background: var(--bg-card); padding: 14px 16px;
    text-align: left; font-family: 'Sora', sans-serif;
    font-size: 13px; font-weight: 700;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
  }
  .calc-table tbody td {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 14px; color: var(--text-secondary);
    background: var(--bg-secondary);
  }
  .calc-table tbody tr:last-child td { border-bottom: none; }
  .calc-table .total { color: var(--accent-green); font-weight: 700; }
  .calc-caveat {
    font-size: 13px; color: var(--text-muted); font-style: italic;
    max-width: 780px; margin: 12px auto 0;
  }

  /* ─── SETUP LIST (numbered CSS counters) ─── */
  .setup-list {
    list-style: none; padding: 0;
    max-width: 780px; margin: 0 auto;
    counter-reset: setup-step;
  }
  .setup-list li {
    counter-increment: setup-step;
    padding: 14px 0;
    font-size: 15px; color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 14px; line-height: 1.6;
  }
  .setup-list li::before {
    content: counter(setup-step);
    min-width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-glow);
    border: 1px solid var(--border-accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora', sans-serif;
    font-size: 13px; font-weight: 700; color: var(--accent-bright);
    flex-shrink: 0; margin-top: 1px;
  }
  .setup-list li:last-child { border-bottom: none; }
  .setup-list li strong { color: var(--text-primary); }

  /* ─── RECIPE CARDS ─── */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 780px;
    margin: 0 auto;
  }
  .recipe-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .recipe-card .recipe-icon {
    font-size: 28px;
    margin-bottom: 12px;
    display: block;
  }
  .recipe-card h3 {
    font-family: 'Sora', sans-serif;
    font-size: 16px; font-weight: 700;
    margin-bottom: 8px; color: var(--text-primary);
  }
  .recipe-card p { color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
  .recipe-steps {
    font-size: 13px; color: var(--accent-bright);
    font-family: 'DM Sans', monospace;
    word-break: break-all;
  }

  /* ─── PROS & CONS ─── */
  .pros-cons-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .pros-column, .cons-column {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
  }
  .pros-column h3, .cons-column h3 {
    font-family: 'Sora', sans-serif;
    font-size: 22px; font-weight: 700;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .pros-column h3 { color: var(--accent-green); }
  .cons-column h3 { color: var(--accent-red); }
  .pros-column ul, .cons-column ul { list-style: none; }
  .pros-column li, .cons-column li {
    padding: 10px 0;
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.6;
    border-bottom: 1px solid var(--border);
  }
  .pros-column li:last-child, .cons-column li:last-child { border-bottom: none; }
  .pros-column li strong, .cons-column li strong { color: var(--text-primary); }

  /* ─── VERDICT BOX ─── */
  .verdict-box {
    background: linear-gradient(135deg, rgba(79,125,249,0.06), rgba(52,211,153,0.04));
    border: 1px solid var(--border-accent);
    border-radius: var(--radius);
    padding: 36px 32px;
    max-width: 780px;
    margin: 0 auto;
    text-align: center;
  }
  .verdict-score {
    font-family: 'Sora', sans-serif;
    font-size: 56px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent-bright), var(--accent-green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .verdict-label {
    font-size: 14px; color: var(--text-muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
  }
  .verdict-text {
    color: var(--text-secondary); font-size: 16px; line-height: 1.7;
    max-width: 620px; margin: 20px auto 0;
  }

  /* ─── METHODOLOGY BOX ─── */
  .methodology-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 780px;
    margin: 0 auto;
  }
  .methodology-box h3 {
    font-family: 'Sora', sans-serif;
    font-size: 18px; font-weight: 700;
    margin-bottom: 16px; color: var(--text-primary);
  }
  .methodology-box p {
    color: var(--text-secondary); font-size: 15px; line-height: 1.7;
    margin-bottom: 14px;
  }
  .methodology-box p:last-child { margin-bottom: 0; }
  .methodology-list {
    list-style: none; padding: 0; margin: 12px 0 0;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px;
  }
  .methodology-list li {
    font-size: 14px; color: var(--text-secondary);
    padding-left: 20px; position: relative;
  }
  .methodology-list li::before {
    content: '\2713'; position: absolute; left: 0;
    color: var(--accent-green); font-weight: 700;
  }

  /* ─── TABLE OF CONTENTS ─── */
  .toc-bar {
    max-width: 780px; margin: 0 auto 40px;
    padding: 20px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .toc-bar p {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-muted);
    margin-bottom: 12px;
  }
  .toc-links {
    display: flex; flex-wrap: wrap; gap: 8px 16px;
    list-style: none; padding: 0;
  }
  .toc-links li a {
    font-size: 13px; color: var(--text-secondary);
    text-decoration: none; border-bottom: 1px solid transparent;
    transition: all 0.2s;
  }
  .toc-links li a:hover {
    color: var(--accent-bright);
    border-bottom-color: var(--accent-bright);
  }

  /* ─── SOURCES BOX ─── */
  .sources-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    max-width: 780px;
    margin: 0 auto;
  }
  .sources-box h3 {
    font-family: 'Sora', sans-serif;
    font-size: 18px; font-weight: 700;
    margin-bottom: 16px; color: var(--text-primary);
  }
  .sources-list {
    list-style: none; padding: 0; margin: 0;
    columns: 2; column-gap: 24px;
  }
  .sources-list li {
    font-size: 14px; color: var(--text-secondary);
    padding: 6px 0; break-inside: avoid;
    display: flex; align-items: baseline; gap: 8px;
  }
  .sources-list li .source-num {
    color: var(--accent-bright); font-weight: 700;
    font-size: 12px; min-width: 20px;
  }
  .sources-list li a {
    color: var(--text-secondary); text-decoration: underline;
    text-decoration-color: rgba(165,165,184,0.3);
  }
  .sources-list li a:hover { color: var(--text-primary); }
  .sources-verified {
    margin-top: 16px; font-size: 13px; color: var(--text-muted);
    font-style: italic;
  }
  .citation-ref {
    font-size: 11px; color: var(--accent-bright);
    text-decoration: none; font-weight: 700;
    vertical-align: super; line-height: 0;
    margin-left: 2px;
  }
  .citation-ref:hover { text-decoration: underline; }

  /* ─── FAQ ─── */
  .faq-list { max-width: 780px; margin: 0 auto; }
  .faq-group-title {
    font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--accent-bright);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 36px 0 8px;
    padding-left: 4px;
  }
  .faq-group-title:first-child { margin-top: 0; }
  .faq-item {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
  }
  .faq-question {
    font-family: 'Sora', sans-serif;
    font-size: 17px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--text-primary);
    background: none; border: none; width: 100%; text-align: left;
    padding: 0; gap: 16px;
  }
  .faq-question::after {
    content: '+'; font-size: 24px; color: var(--text-muted);
    transition: transform 0.3s; flex-shrink: 0;
  }
  .faq-question.active::after { transform: rotate(45deg); }
  .faq-answer {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s ease;
  }
  .faq-answer.open { max-height: 600px; padding-top: 14px; }
  .faq-answer p { color: var(--text-secondary); font-size: 15px; line-height: 1.7; }

  /* ─── FINAL CTA ─── */
  .final-cta {
    padding: 80px 0;
    text-align: center;
  }
  .final-cta-box {
    background: linear-gradient(135deg, rgba(79,125,249,0.08), rgba(52,211,153,0.04));
    border: 1px solid var(--border-accent);
    border-radius: 24px;
    padding: 64px 48px;
    position: relative;
    overflow: hidden;
  }
  .final-cta-box::before {
    content: '';
    position: absolute; top: -100px; right: -100px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(79,125,249,0.1), transparent 60%);
  }
  .final-cta h2 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 900; letter-spacing: -1.5px;
    margin-bottom: 16px;
    position: relative;
  }
  .final-cta p {
    color: var(--text-secondary);
    font-size: 17px; max-width: 560px; margin: 0 auto 32px;
    position: relative;
  }
  .final-cta .btn { position: relative; }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px 0;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }
  footer a { color: var(--text-secondary); text-decoration: none; }
  footer a:hover { color: var(--text-primary); }
  .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .affiliate-disclosure {
    max-width: 640px; margin: 16px auto 0;
    font-size: 11px; color: var(--text-muted); line-height: 1.6;
  }

  /* ─── SECTION SPACING ─── */
  .page-section { padding: 70px 0; }

  /* ─── AUTHOR BYLINE ─── */
  .author-byline {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease both;
  }
  .author-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-green));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: #fff;
    flex-shrink: 0;
  }
  .author-info { font-size: 14px; line-height: 1.4; }
  .author-name { font-weight: 700; color: var(--text-primary); }
  .author-title { color: var(--text-muted); font-size: 13px; }

  /* ─── INLINE DISCLOSURE ─── */
  .inline-disclosure {
    font-size: 13px; color: var(--text-muted); font-style: italic;
    text-align: center; margin-top: 16px;
    animation: fadeUp 0.6s 0.45s ease both;
  }
  .inline-disclosure a { color: var(--text-secondary); text-decoration: underline; }

  /* ─── ARTICLE-SPECIFIC ─── */
  .breadcrumb { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; padding-top: 100px; max-width: 780px; margin-left: auto; margin-right: auto; }
  .breadcrumb a { color: var(--text-secondary); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent-bright); }
  .article-header { max-width: 780px; margin: 0 auto 40px; }
  .article-header h1 { font-family: 'Sora', sans-serif; font-size: clamp(28px, 4vw, 44px); font-weight: 900; letter-spacing: -1.5px; line-height: 1.15; margin-bottom: 20px; }
  .article-meta { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
  .related-guides { max-width: 780px; margin: 60px auto 0; }

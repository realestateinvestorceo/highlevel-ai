name: Daily Auto-Improve

on:
  schedule:
    # Every day at 6:00 AM UTC (11:00 PM Pacific)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger — click "Run workflow" in GitHub Actions UI

permissions:
  contents: write

jobs:
  auto-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r scripts/seo/requirements.txt

      - name: Install Node.js dependencies
        run: |
          if [ -f package.json ]; then npm install; else echo "No package.json"; fi

      - name: Write credentials
        run: |
          mkdir -p scripts/.credentials
          echo '${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}' > /tmp/ga4-service-account.json
          echo '${{ secrets.GSC_CLIENT_SECRET_JSON }}' > scripts/.credentials/client_secret.json
          echo '${{ secrets.GSC_TOKEN_JSON }}' > scripts/.credentials/token.json

      - name: Create .env
        run: |
          cat > .env << ENVEOF
          GA4_PROPERTY_ID=526181718
          GA4_SERVICE_ACCOUNT_FILE=/tmp/ga4-service-account.json
          GSC_SITE_URL=sc-domain:highlevel.ai
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          ENVEOF

      # ══════════════════════════════════════
      # STEP 1: Auto-fix outdated content
      # ══════════════════════════════════════
      - name: Auto-fix years and dates
        run: python3 scripts/seo/auto_fix.py --fix-all
        continue-on-error: true

      # ══════════════════════════════════════
      # STEP 2: Inject internal links
      # ══════════════════════════════════════
      - name: Auto-inject internal links
        run: node scripts/seo/auto_internal_links.js --apply
        continue-on-error: true

      # ══════════════════════════════════════
      # STEP 3: Update sitemap + LLMs.txt
      # ══════════════════════════════════════
      - name: Update sitemap and LLMs.txt
        run: python3 scripts/seo/update_sitemap.py
        continue-on-error: true

      # ══════════════════════════════════════
      # STEP 4: Refresh dashboard data
      # ══════════════════════════════════════
      - name: Generate dashboard data
        run: python3 scripts/seo/generate_dashboard_data.py
        continue-on-error: true

      # ══════════════════════════════════════
      # STEP 5: Commit and deploy
      # ══════════════════════════════════════
      - name: Commit and push improvements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html blog/*.html tools/*.html sitemap.xml llms.txt llms-full.txt dashboard-data.json scripts/seo/reports/ scripts/seo/data/schema_fixes.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Auto-improve: daily SEO fixes $(date +%Y-%m-%d)"
          git push

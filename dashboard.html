<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard — highlevel.ai</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26A1;</text></svg>" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --card-bg: #12121a;
  --card-bg-hover: #181825;
  --accent-blue: #4f7df9;
  --accent-green: #34d399;
  --accent-orange: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #a855f7;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: rgba(255,255,255,0.06);
  --radius: 16px;
  --font-body: 'DM Sans', sans-serif;
  --font-heading: 'Sora', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Login Screen ── */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

.login-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.login-card h1 {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.login-card p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 28px;
}

.login-card input[type="password"] {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}

.login-card input[type="password"]:focus {
  border-color: var(--accent-blue);
}

.login-card button {
  width: 100%;
  padding: 14px;
  background: var(--accent-blue);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.login-card button:hover { opacity: 0.9; }

.login-error {
  color: var(--accent-red);
  font-size: 0.85rem;
  margin-top: 12px;
  min-height: 20px;
}

/* ── Loading ── */
#loading-screen {
  display: none;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  flex-direction: column;
  gap: 16px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loading-screen p {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* ── Dashboard ── */
#dashboard {
  display: none;
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

/* Header */
.dash-header {
  margin-bottom: 36px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.dash-header h1 {
  font-family: var(--font-heading);
  font-size: 1.75rem;
  font-weight: 700;
}

.dash-header .last-updated {
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* ── Earnings (THE scoreboard) ── */
.earnings-section {
  background: linear-gradient(135deg, #0f1a0f 0%, #12121a 50%, #1a0f1a 100%);
  border: 1px solid rgba(52, 211, 153, 0.2);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.earnings-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
}

.earnings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.earnings-title {
  font-family: var(--font-heading);
  font-size: 1.3rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

.earnings-title .money-icon {
  font-size: 1.5rem;
}

.earnings-badge {
  background: rgba(52, 211, 153, 0.15);
  color: var(--accent-green);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
}

.earnings-big-number {
  font-family: var(--font-heading);
  font-size: 3rem;
  font-weight: 700;
  color: var(--accent-green);
  margin-bottom: 4px;
  line-height: 1.1;
}

.earnings-sub {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.earnings-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.earnings-stat {
  text-align: center;
  padding: 16px 8px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
}

.earnings-stat-val {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-primary);
}

.earnings-stat-label {
  color: var(--text-muted);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

.screenshot-area {
  border: 2px dashed rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.screenshot-area:hover {
  border-color: var(--accent-blue);
  background: rgba(79, 125, 249, 0.05);
}

.screenshot-area.has-image {
  border-style: solid;
  border-color: rgba(255,255,255,0.08);
  padding: 12px;
}

.screenshot-area img {
  max-width: 100%;
  border-radius: 8px;
}

.screenshot-placeholder {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.screenshot-placeholder .upload-icon {
  font-size: 2rem;
  display: block;
  margin-bottom: 8px;
}

.screenshot-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 12px;
}

.screenshot-actions button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  padding: 6px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: var(--font-body);
  transition: all 0.2s;
}

.screenshot-actions button:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text-primary);
}

.screenshot-actions button.remove-btn:hover {
  border-color: var(--accent-red);
  color: var(--accent-red);
}

.screenshot-date {
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-top: 8px;
}

.earnings-file-input {
  display: none;
}

.extraction-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px;
  color: var(--accent-blue);
  font-size: 0.9rem;
}

.extraction-spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(79,125,249,0.3);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.earnings-breakdown {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
  font-size: 0.85rem;
}

.earnings-breakdown th {
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  padding: 8px 12px;
  text-align: right;
  border-bottom: 1px solid var(--border);
}

.earnings-breakdown th:first-child { text-align: left; }

.earnings-breakdown td {
  padding: 7px 12px;
  text-align: right;
  color: var(--text-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.earnings-breakdown td:first-child {
  text-align: left;
  color: var(--text-primary);
}

.earnings-breakdown td.has-value {
  color: var(--accent-green);
  font-weight: 600;
}

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 0.85rem;
  z-index: 9999;
  animation: fadeUp 0.3s;
  max-width: 360px;
}

.toast.success { background: rgba(52,211,153,0.15); border: 1px solid var(--accent-green); color: var(--accent-green); }
.toast.error { background: rgba(239,68,68,0.15); border: 1px solid var(--accent-red); color: var(--accent-red); }

.earnings-extracted-date {
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-top: 4px;
}

.manual-entry {
  margin-top: 16px;
  padding: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.manual-entry summary {
  color: var(--text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  user-select: none;
}

.manual-entry summary:hover { color: var(--text-primary); }

.manual-entry-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 12px;
}

@media (max-width: 600px) { .manual-entry-grid { grid-template-columns: repeat(2, 1fr); } }

.manual-entry-grid label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  display: block;
  margin-bottom: 4px;
}

.manual-entry-grid input {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
}

.manual-entry-grid input:focus { border-color: var(--accent-blue); }

.manual-save-btn {
  margin-top: 12px;
  padding: 8px 20px;
  background: var(--accent-green);
  color: #000;
  border: none;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.manual-save-btn:hover { opacity: 0.85; }

/* ── Trend Charts ── */
.trends-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 24px;
}

@media (max-width: 768px) {
  .trends-section { grid-template-columns: 1fr; }
}

.trend-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

.trend-card h3 {
  font-family: var(--font-heading);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.trend-card .trend-value {
  font-family: var(--font-heading);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 16px;
}

.trend-card .trend-value .trend-delta {
  font-size: 0.8rem;
  font-weight: 500;
  margin-left: 8px;
}

.trend-delta.up { color: var(--accent-green); }
.trend-delta.down { color: var(--accent-red); }

.trend-chart-wrap {
  position: relative;
  height: 120px;
}

@media (max-width: 600px) {
  .earnings-stats-row { grid-template-columns: repeat(2, 1fr); }
  .earnings-big-number { font-size: 2.2rem; }
}

/* ── Hero Stats ── */
.hero-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 36px;
}

.hero-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}

.hero-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.hero-card .hero-icon {
  font-size: 1.6rem;
  margin-bottom: 12px;
  display: block;
}

.hero-card .hero-value {
  font-family: var(--font-heading);
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 4px;
}

.hero-card .hero-label {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.hero-card .hero-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
}

/* Colored top borders on hero cards */
.hero-card.blue { border-top: 3px solid var(--accent-blue); }
.hero-card.blue .hero-value { color: var(--accent-blue); }
.hero-card.green { border-top: 3px solid var(--accent-green); }
.hero-card.green .hero-value { color: var(--accent-green); }
.hero-card.purple { border-top: 3px solid var(--accent-purple); }
.hero-card.purple .hero-value { color: var(--accent-purple); }
.hero-card.orange { border-top: 3px solid var(--accent-orange); }
.hero-card.orange .hero-value { color: var(--accent-orange); }

/* Subtle glow background */
.hero-card::after {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  opacity: 0.06;
  pointer-events: none;
}
.hero-card.blue::after { background: var(--accent-blue); }
.hero-card.green::after { background: var(--accent-green); }
.hero-card.purple::after { background: var(--accent-purple); }
.hero-card.orange::after { background: var(--accent-orange); }

/* ── Section Cards ── */
.dash-section {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 24px;
}

.dash-section h2 {
  font-family: var(--font-heading);
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.icon-green { background: rgba(52,211,153,0.15); }
.icon-blue { background: rgba(79,125,249,0.15); }
.icon-purple { background: rgba(168,85,247,0.15); }
.icon-orange { background: rgba(245,158,11,0.15); }

/* ── Traffic Sources Bar Chart ── */
.sources-chart {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.source-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.source-label {
  width: 110px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  text-align: right;
  flex-shrink: 0;
}

.source-bar-wrap {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border-radius: 6px;
  height: 28px;
  position: relative;
  overflow: hidden;
}

.source-bar {
  height: 100%;
  border-radius: 6px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  transition: width 0.6s ease;
  min-width: 0;
}

.source-bar span {
  font-size: 0.75rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.source-count {
  width: 70px;
  text-align: right;
  font-size: 0.85rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* Stacked bar */
.stacked-bar-wrap {
  width: 100%;
  height: 32px;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  margin-bottom: 16px;
}

.stacked-seg {
  height: 100%;
  transition: width 0.5s ease;
  min-width: 0;
}

.stacked-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 24px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── Site Health Mini Cards ── */
.health-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.health-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.health-icon {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.health-icon.ok { background: rgba(52,211,153,0.15); }
.health-icon.warn { background: rgba(245,158,11,0.15); }

.health-text .h-value {
  font-family: var(--font-heading);
  font-size: 1.15rem;
  font-weight: 600;
  line-height: 1.2;
}

.health-text .h-label {
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ── AI Visibility ── */
.ai-highlight {
  background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(79,125,249,0.08));
  border: 1px solid rgba(168,85,247,0.15);
  border-radius: 12px;
  padding: 24px;
  line-height: 1.7;
}

.ai-highlight .ai-stat {
  font-family: var(--font-heading);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent-purple);
  display: block;
  margin-bottom: 8px;
}

.ai-highlight p {
  color: var(--text-secondary);
  font-size: 0.95rem;
}

.ai-sources {
  display: flex;
  gap: 14px;
  margin-top: 18px;
  flex-wrap: wrap;
}

.ai-source-chip {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.ai-source-chip .chip-val {
  font-family: var(--font-heading);
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--accent-purple);
}

.ai-source-chip .chip-name {
  font-size: 0.82rem;
  color: var(--text-muted);
}

/* ── Keyword Empty State ── */
.empty-state {
  background: var(--bg);
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 32px 28px;
  text-align: center;
}

.empty-state .empty-icon {
  font-size: 2rem;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty-state p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  max-width: 460px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ── Action Items ── */
.action-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.action-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent-orange);
  border-radius: 10px;
  padding: 16px 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.action-item.green-border { border-left-color: var(--accent-green); }
.action-item.blue-border { border-left-color: var(--accent-blue); }
.action-item.purple-border { border-left-color: var(--accent-purple); }

.action-num {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--accent-orange);
  min-width: 22px;
  padding-top: 1px;
}

.action-text {
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.55;
}

.action-text strong {
  color: var(--text-primary);
  font-weight: 600;
}

/* ── Tables ── */
.table-wrap {
  overflow-x: auto;
  margin-top: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
}

thead th {
  text-align: left;
  padding: 10px 14px;
  color: var(--text-muted);
  font-weight: 500;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody td {
  padding: 10px 14px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }

/* ── Footer ── */
.dash-footer {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.78rem;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  line-height: 1.6;
}

/* ── Error State ── */
.error-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 48px 40px;
  text-align: center;
  max-width: 560px;
  margin: 80px auto;
}

.error-card .err-icon { font-size: 2.5rem; margin-bottom: 16px; }
.error-card h2 { font-family: var(--font-heading); font-size: 1.25rem; margin-bottom: 8px; }
.error-card p { color: var(--text-secondary); font-size: 0.9rem; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .hero-stats { grid-template-columns: repeat(2, 1fr); }
  .health-row { grid-template-columns: 1fr; }
  .source-label { width: 80px; font-size: 0.78rem; }
}

@media (max-width: 600px) {
  .hero-stats { grid-template-columns: 1fr; }
  .login-card { padding: 36px 24px; }
  #dashboard { padding: 20px 16px 48px; }
  .dash-section { padding: 20px; }
  .hero-card .hero-value { font-size: 1.8rem; }
  .dash-header h1 { font-size: 1.4rem; }
  .dash-header { flex-direction: column; }
  .ai-highlight .ai-stat { font-size: 1.4rem; }
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in {
  animation: fadeUp 0.4s ease forwards;
  opacity: 0;
}

.animate-in:nth-child(1) { animation-delay: 0.05s; }
.animate-in:nth-child(2) { animation-delay: 0.1s; }
.animate-in:nth-child(3) { animation-delay: 0.15s; }
.animate-in:nth-child(4) { animation-delay: 0.2s; }
.animate-in:nth-child(5) { animation-delay: 0.25s; }
.animate-in:nth-child(6) { animation-delay: 0.3s; }
.animate-in:nth-child(7) { animation-delay: 0.35s; }
.animate-in:nth-child(8) { animation-delay: 0.4s; }
</style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <h1>highlevel.ai Dashboard</h1>
    <p>Enter the dashboard password to continue.</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off" autofocus>
    <button id="pw-btn" type="button">Unlock</button>
    <div class="login-error" id="pw-error"></div>
  </div>
</div>

<!-- ── Loading ── -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading dashboard data&hellip;</p>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard"></div>

<script>
(function() {
  'use strict';

  var HASH = '20779ca4e9489d7b0a80076f0f79aa5ddbb2f3b322eb43355687d12c9f53c19c';
  var AUTH_KEY = 'seo_dash_auth';

  // ── Utility ──
  function esc(str) {
    if (str == null) return '';
    var d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function num(v) { return typeof v === 'number' ? v : 0; }

  function commas(n) {
    return n != null ? Number(n).toLocaleString() : '0';
  }

  async function sha256(text) {
    var encoded = new TextEncoder().encode(text);
    var buf = await crypto.subtle.digest('SHA-256', encoded);
    return Array.from(new Uint8Array(buf)).map(function(b) {
      return b.toString(16).padStart(2, '0');
    }).join('');
  }

  function show(id) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'none';
    var el = document.getElementById(id);
    if (el) el.style.display = (id === 'login-screen' || id === 'loading-screen') ? 'flex' : 'block';
  }

  // ── Auth ──
  async function attemptLogin(pw) {
    var hash = await sha256(pw);
    if (hash === HASH) {
      sessionStorage.setItem(AUTH_KEY, '1');
      loadData();
    } else {
      document.getElementById('pw-error').textContent = 'Wrong password';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  document.getElementById('pw-btn').addEventListener('click', function() {
    var pw = document.getElementById('pw-input').value;
    if (pw) attemptLogin(pw);
  });

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var pw = this.value;
      if (pw) attemptLogin(pw);
    }
    document.getElementById('pw-error').textContent = '';
  });

  // ── Check session ──
  if (sessionStorage.getItem(AUTH_KEY) === '1') {
    loadData();
  }

  // ── Load Data ──
  function loadData() {
    show('loading-screen');
    fetch('dashboard-data.json')
      .then(function(r) {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(function(data) {
        renderDashboard(data);
      })
      .catch(function() {
        show('dashboard');
        document.getElementById('dashboard').innerHTML =
          '<div class="error-card">' +
          '<div class="err-icon">&#x1F4CB;</div>' +
          '<h2>No Reports Generated Yet</h2>' +
          '<p>Run the automation suite first to generate <code>dashboard-data.json</code>.</p>' +
          '</div>';
      });
  }

  // ── Helper: find source sessions ──
  function findSource(sources, sourceName, medium) {
    if (!sources || !sources.length) return 0;
    var total = 0;
    for (var i = 0; i < sources.length; i++) {
      var s = sources[i];
      var sName = (s.source || '').toLowerCase();
      var sMed = (s.medium || '').toLowerCase();
      if (medium) {
        if (sName.indexOf(sourceName) !== -1 && sMed === medium) total += num(s.sessions);
      } else {
        if (sName.indexOf(sourceName) !== -1) total += num(s.sessions);
      }
    }
    return total;
  }

  // ── Render ──
  function renderDashboard(d) {
    var html = '';
    var traffic = d.traffic || {};
    var sources = traffic.sources || [];
    var stats = d.stats || {};
    var freshData = d.freshness || {};
    var schemaData = d.schema || {};
    var kwData = d.keywords || {};
    var llmData = d.llm_visibility || {};
    var actions = d.priority_actions || [];

    var totalUsers = num(traffic.users);
    var totalSessions = num(traffic.sessions);

    // Extract key sources
    var googleOrganic = findSource(sources, 'google', 'organic');
    var chatgptSessions = findSource(sources, 'chatgpt');
    var perplexitySessions = findSource(sources, 'perplexity');
    var aiTotal = chatgptSessions + perplexitySessions;
    var ctaClicks = num(traffic.cta_clicks);
    var directSessions = findSource(sources, 'direct');
    var bingSessions = findSource(sources, 'bing');
    var facebookSessions = findSource(sources, 'facebook');
    var quoraSessions = findSource(sources, 'quora');
    var socialSessions = facebookSessions + quoraSessions;

    var updated = d.generated_at || 'Unknown';

    // Header
    html += '<div class="dash-header">';
    html += '<h1>highlevel.ai Dashboard</h1>';
    html += '<div class="last-updated">Updated ' + esc(updated) + '</div>';
    html += '</div>';

    // ═══════════════════════════════════════
    // 0. EARNINGS — THE SCOREBOARD
    // ═══════════════════════════════════════
    var saved = localStorage.getItem('hl_earnings_img');
    var savedDate = localStorage.getItem('hl_earnings_date') || '';

    html += '<div class="earnings-section animate-in">';
    html += '<div class="earnings-header">';
    html += '<div class="earnings-title"><span class="money-icon">💰</span> Affiliate Earnings</div>';
    html += '<div class="earnings-badge">THIS IS WHAT MATTERS</div>';
    html += '</div>';

    // Use extracted data if available, otherwise fall back to defaults
    var earningsRaw = localStorage.getItem('hl_earnings_data');
    var earningsData = null;
    var eT = { clicks: 37, signups: 1, customers: 1, earnings: 38.80 }; // defaults
    var earningsDate = localStorage.getItem('hl_earnings_extracted_at') || '';
    if (earningsRaw) {
      try {
        earningsData = JSON.parse(earningsRaw);
        eT = earningsData.totals || eT;
      } catch(e) {}
    }
    var convRate = eT.clicks > 0 ? ((eT.customers / eT.clicks) * 100).toFixed(1) + '%' : '0%';
    var period = earningsData ? (earningsData.period || 'Recent') : '6mo';

    html += '<div class="earnings-big-number">$' + eT.earnings.toFixed(2) + '</div>';
    html += '<div class="earnings-sub">Total commissions earned · 40% recurring = $' + eT.earnings.toFixed(2) + '/mo from ' + eT.customers + ' customer' + (eT.customers !== 1 ? 's' : '') + '</div>';

    html += '<div class="earnings-stats-row">';
    html += '<div class="earnings-stat"><div class="earnings-stat-val">' + commas(eT.clicks) + '</div><div class="earnings-stat-label">Clicks (' + esc(period) + ')</div></div>';
    html += '<div class="earnings-stat"><div class="earnings-stat-val">' + commas(eT.signups) + '</div><div class="earnings-stat-label">Signups</div></div>';
    html += '<div class="earnings-stat"><div class="earnings-stat-val">' + commas(eT.customers) + '</div><div class="earnings-stat-label">Paying Customers</div></div>';
    html += '<div class="earnings-stat"><div class="earnings-stat-val">' + convRate + '</div><div class="earnings-stat-label">Click→Customer</div></div>';
    html += '</div>';

    // Per-day breakdown table (only if extracted data exists)
    if (earningsData && earningsData.rows && earningsData.rows.length > 0) {
      html += '<table class="earnings-breakdown"><thead><tr><th>Day</th><th>Clicks</th><th>Signups</th><th>Customers</th><th>Earnings</th></tr></thead><tbody>';
      earningsData.rows.forEach(function(r) {
        html += '<tr>';
        html += '<td>' + esc(r.day) + '</td>';
        html += '<td>' + r.clicks + '</td>';
        html += '<td>' + r.signups + '</td>';
        html += '<td' + (r.customers > 0 ? ' class="has-value"' : '') + '>' + r.customers + '</td>';
        html += '<td' + (r.earnings > 0 ? ' class="has-value"' : '') + '>$' + r.earnings.toFixed(2) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      if (earningsDate) html += '<div class="earnings-extracted-date">Extracted ' + esc(earningsDate) + '</div>';
    } else {
      html += '<div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:16px;">Upload a GHL affiliate screenshot to see daily breakdown</div>';
    }

    // Screenshot upload area
    html += '<input type="file" accept="image/*" class="earnings-file-input" id="earningsFileInput">';
    html += '<div class="screenshot-area' + (saved ? ' has-image' : '') + '" id="screenshotArea">';
    if (saved) {
      html += '<img src="' + saved + '" alt="GHL Affiliate Performance" id="screenshotImg">';
      html += '<div class="screenshot-actions">';
      html += '<button onclick="document.getElementById(\'earningsFileInput\').click()">📷 Update Screenshot</button>';
      html += '<button class="remove-btn" onclick="removeScreenshot()">✕ Remove</button>';
      html += '</div>';
      if (savedDate) html += '<div class="screenshot-date">Uploaded ' + esc(savedDate) + '</div>';
    } else {
      html += '<div class="screenshot-placeholder">';
      html += '<span class="upload-icon">📸</span>';
      html += 'Drop your GHL affiliate portal screenshot here<br><small>or click to upload</small>';
      html += '</div>';
    }
    html += '</div>';

    // Manual entry form
    html += '<details class="manual-entry"><summary>✏️ Enter numbers manually</summary>';
    html += '<div class="manual-entry-grid">';
    html += '<div><label>Clicks</label><input type="number" id="manualClicks" value="' + eT.clicks + '"></div>';
    html += '<div><label>Signups</label><input type="number" id="manualSignups" value="' + eT.signups + '"></div>';
    html += '<div><label>Customers</label><input type="number" id="manualCustomers" value="' + eT.customers + '"></div>';
    html += '<div><label>Earnings ($)</label><input type="number" step="0.01" id="manualEarnings" value="' + eT.earnings.toFixed(2) + '"></div>';
    html += '</div>';
    html += '<button class="manual-save-btn" onclick="saveManualEarnings()">Save</button>';
    html += '</details>';

    html += '</div>';

    // ═══════════════════════════════════════
    // 1. HERO STATS
    // ═══════════════════════════════════════
    html += '<div class="hero-stats">';

    html += '<div class="hero-card blue animate-in">';
    html += '<span class="hero-icon">&#x1F465;</span>';
    html += '<div class="hero-value">' + commas(totalUsers) + '</div>';
    html += '<div class="hero-label">Visitors</div>';
    html += '<div class="hero-sub">Last 30 days</div>';
    html += '</div>';

    html += '<div class="hero-card green animate-in">';
    html += '<span class="hero-icon">&#x1F50D;</span>';
    html += '<div class="hero-value">' + commas(googleOrganic) + '</div>';
    html += '<div class="hero-label">from Google</div>';
    html += '<div class="hero-sub">Organic search</div>';
    html += '</div>';

    html += '<div class="hero-card purple animate-in">';
    html += '<span class="hero-icon">&#x1F916;</span>';
    html += '<div class="hero-value">' + commas(aiTotal) + '</div>';
    html += '<div class="hero-label">from AI</div>';
    html += '<div class="hero-sub">ChatGPT + Perplexity</div>';
    html += '</div>';

    html += '<div class="hero-card orange animate-in">';
    html += '<span class="hero-icon">&#x1F5B1;&#xFE0F;</span>';
    html += '<div class="hero-value">' + commas(ctaClicks) + '</div>';
    html += '<div class="hero-label">CTA Clicks</div>';
    html += '<div class="hero-sub">Affiliate link clicks</div>';
    html += '</div>';

    html += '</div>';

    // ═══════════════════════════════════════
    // 1b. TREND CHARTS
    // ═══════════════════════════════════════
    var dailyData = traffic.daily || [];
    html += '<div class="trends-section animate-in">';

    // -- Visitors trend --
    if (dailyData.length > 1) {
      var lastWeekUsers = 0, prevWeekUsers = 0;
      dailyData.forEach(function(dd, i) {
        if (i >= dailyData.length - 7) lastWeekUsers += dd.users;
        else if (i >= dailyData.length - 14) prevWeekUsers += dd.users;
      });
      var usersDelta = prevWeekUsers > 0 ? Math.round(((lastWeekUsers - prevWeekUsers) / prevWeekUsers) * 100) : 0;
      var usersDeltaClass = usersDelta >= 0 ? 'up' : 'down';
      var usersDeltaSign = usersDelta >= 0 ? '+' : '';

      html += '<div class="trend-card">';
      html += '<h3>Visitors (30 days)</h3>';
      html += '<div class="trend-value">' + commas(totalUsers);
      if (usersDelta !== 0) html += ' <span class="trend-delta ' + usersDeltaClass + '">' + usersDeltaSign + usersDelta + '% vs prev week</span>';
      html += '</div>';
      html += '<div class="trend-chart-wrap"><canvas id="visitorsChart"></canvas></div>';
      html += '</div>';
    }

    // -- Earnings trend (from screenshot history) --
    var earningsHistory = [];
    try { earningsHistory = JSON.parse(localStorage.getItem('hl_earnings_history') || '[]'); } catch(e) {}
    if (earningsHistory.length > 1) {
      var latestEarnings = earningsHistory[earningsHistory.length - 1].earnings || 0;
      html += '<div class="trend-card">';
      html += '<h3>Affiliate Earnings (over time)</h3>';
      html += '<div class="trend-value">$' + latestEarnings.toFixed(2) + '</div>';
      html += '<div class="trend-chart-wrap"><canvas id="earningsChart"></canvas></div>';
      html += '</div>';
    } else {
      html += '<div class="trend-card">';
      html += '<h3>Affiliate Clicks (over time)</h3>';
      html += '<div style="color:var(--text-muted);font-size:0.85rem;padding:20px 0;">Upload screenshots regularly to build a trend line</div>';
      html += '</div>';
    }

    html += '</div>';

    // ═══════════════════════════════════════
    // 2. TRAFFIC SOURCES
    // ═══════════════════════════════════════
    // Build grouped sources
    var grouped = [
      { name: 'Google (organic)', sessions: googleOrganic, color: '#34d399' },
      { name: 'Direct', sessions: directSessions, color: '#64748b' },
      { name: 'ChatGPT', sessions: chatgptSessions, color: '#4f7df9' },
      { name: 'Bing', sessions: bingSessions, color: '#f59e0b' },
      { name: 'Social', sessions: socialSessions, color: '#a855f7' }
    ];

    // Calculate "Other"
    var accounted = googleOrganic + directSessions + chatgptSessions + bingSessions + socialSessions + perplexitySessions;
    var otherSessions = Math.max(0, totalSessions - accounted);
    if (perplexitySessions > 0) {
      grouped.push({ name: 'Perplexity', sessions: perplexitySessions, color: '#06b6d4' });
    }
    if (otherSessions > 0) {
      grouped.push({ name: 'Other', sessions: otherSessions, color: '#475569' });
    }

    // Sort descending
    grouped.sort(function(a, b) { return b.sessions - a.sessions; });

    var maxSessions = grouped.length > 0 ? grouped[0].sessions : 1;

    html += '<div class="dash-section animate-in">';
    html += '<h2><span class="section-icon icon-blue">&#x1F4CA;</span>Traffic Sources</h2>';

    // Stacked bar
    if (totalSessions > 0) {
      html += '<div class="stacked-bar-wrap">';
      for (var si = 0; si < grouped.length; si++) {
        var pct = (grouped[si].sessions / totalSessions * 100);
        if (pct < 0.5) continue;
        html += '<div class="stacked-seg" style="width:' + pct.toFixed(1) + '%;background:' + grouped[si].color + '" title="' + esc(grouped[si].name) + ': ' + grouped[si].sessions + '"></div>';
      }
      html += '</div>';

      // Legend
      html += '<div class="stacked-legend">';
      for (var li = 0; li < grouped.length; li++) {
        if (grouped[li].sessions === 0) continue;
        var lpct = (grouped[li].sessions / totalSessions * 100).toFixed(1);
        html += '<span class="legend-item"><span class="legend-dot" style="background:' + grouped[li].color + '"></span>' + esc(grouped[li].name) + ' &mdash; ' + lpct + '%</span>';
      }
      html += '</div>';
    }

    // Bar chart rows
    html += '<div class="sources-chart">';
    for (var bi = 0; bi < grouped.length; bi++) {
      var g = grouped[bi];
      if (g.sessions === 0) continue;
      var barPct = Math.max(2, (g.sessions / maxSessions) * 100);
      html += '<div class="source-row">';
      html += '<div class="source-label">' + esc(g.name) + '</div>';
      html += '<div class="source-bar-wrap"><div class="source-bar" style="width:' + barPct.toFixed(1) + '%;background:' + g.color + '"><span>' + g.sessions + '</span></div></div>';
      html += '<div class="source-count">' + (g.sessions / totalSessions * 100).toFixed(1) + '%</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';

    // ═══════════════════════════════════════
    // 3. SITE HEALTH
    // ═══════════════════════════════════════
    var totalPages = stats.total_pages || 0;
    var totalSchemas = schemaData.total_schemas || 0;
    var schemaIssues = num(schemaData.issues);
    var freshnessTotal = num(freshData.total_issues || stats.freshness_issues);

    html += '<div class="dash-section animate-in">';
    html += '<h2><span class="section-icon icon-green">&#x2705;</span>Site Health</h2>';
    html += '<div class="health-row">';

    // Pages
    html += '<div class="health-card">';
    html += '<div class="health-icon ok">&#x2714;&#xFE0F;</div>';
    html += '<div class="health-text"><div class="h-value">' + commas(totalPages) + ' Pages</div><div class="h-label">All indexed and active</div></div>';
    html += '</div>';

    // Schemas
    html += '<div class="health-card">';
    html += '<div class="health-icon ok">&#x2714;&#xFE0F;</div>';
    html += '<div class="health-text"><div class="h-value">' + commas(totalSchemas) + ' Schemas Valid</div><div class="h-label">' + (schemaIssues === 0 ? 'No issues found' : schemaIssues + ' issues') + '</div></div>';
    html += '</div>';

    // Content warnings
    html += '<div class="health-card">';
    html += '<div class="health-icon warn">&#x26A0;&#xFE0F;</div>';
    html += '<div class="health-text"><div class="h-value">' + commas(freshnessTotal) + ' Content Warnings</div><div class="h-label">Mostly pricing refs to verify</div></div>';
    html += '</div>';

    html += '</div>'; // health-row
    html += '</div>'; // section

    // ═══════════════════════════════════════
    // 4. AI VISIBILITY
    // ═══════════════════════════════════════
    html += '<div class="dash-section animate-in">';
    html += '<h2><span class="section-icon icon-purple">&#x1F916;</span>AI Visibility</h2>';

    var citationRate = llmData.citation_rate;
    var hasCitation = citationRate != null && citationRate > 0;

    if (hasCitation) {
      html += '<div class="ai-highlight">';
      html += '<span class="ai-stat">' + esc(citationRate) + '% Citation Rate</span>';
      html += '<p>AI tools are citing highlevel.ai in their responses.</p>';
      html += '</div>';
    } else {
      html += '<div class="ai-highlight">';
      if (aiTotal > 0) {
        html += '<p style="font-size:1rem;color:var(--text-primary);margin-bottom:8px;font-weight:500;">AI tools aren\'t citing highlevel.ai directly yet, but ChatGPT is sending you <strong style="color:var(--accent-purple)">' + chatgptSessions + ' visitors/month</strong> via referral links &mdash; that\'s a good sign!</p>';
        html += '<p>As your content improves, expect direct citations to follow the referral traffic.</p>';
      } else {
        html += '<p>No AI citation or referral data available yet. Once AI tools start referencing your content, traffic and citations will appear here.</p>';
      }
      html += '</div>';
    }

    // Show AI referral chips
    if (aiTotal > 0) {
      html += '<div class="ai-sources">';
      if (chatgptSessions > 0) {
        html += '<div class="ai-source-chip"><span class="chip-val">' + chatgptSessions + '</span><span class="chip-name">visitors from ChatGPT</span></div>';
      }
      if (perplexitySessions > 0) {
        html += '<div class="ai-source-chip"><span class="chip-val">' + perplexitySessions + '</span><span class="chip-name">visitors from Perplexity</span></div>';
      }
      html += '</div>';
    }

    html += '</div>';

    // ═══════════════════════════════════════
    // 5. KEYWORD OPPORTUNITIES
    // ═══════════════════════════════════════
    var kws = kwData.striking_distance || [];

    html += '<div class="dash-section animate-in">';
    html += '<h2><span class="section-icon icon-blue">&#x1F50D;</span>Keyword Opportunities</h2>';

    if (kws.length > 0) {
      kws.sort(function(a, b) { return num(b.impressions) - num(a.impressions); });
      html += '<div class="table-wrap"><table><thead><tr><th>Keyword</th><th>Position</th><th>Impressions</th><th>Clicks</th></tr></thead><tbody>';
      for (var ki = 0; ki < kws.length; ki++) {
        var k = kws[ki];
        html += '<tr>';
        html += '<td>' + esc(k.keyword || k.query || '') + '</td>';
        html += '<td>' + esc(k.position != null ? k.position : '—') + '</td>';
        html += '<td>' + (k.impressions != null ? commas(k.impressions) : '—') + '</td>';
        html += '<td>' + (k.clicks != null ? commas(k.clicks) : '—') + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table></div>';
    } else {
      html += '<div class="empty-state">';
      html += '<div class="empty-icon">&#x1F50E;</div>';
      html += '<p>Connect Google Search Console to see which keywords you\'re close to ranking for. These are your biggest quick wins &mdash; keywords where you\'re on page 2 and a small content boost could move you to page 1.</p>';
      html += '</div>';
    }

    html += '</div>';

    // ═══════════════════════════════════════
    // 6. WHAT TO DO NEXT
    // ═══════════════════════════════════════
    html += '<div class="dash-section animate-in">';
    html += '<h2><span class="section-icon icon-orange">&#x26A1;</span>What To Do Next</h2>';

    var smartActions = [];

    // Use priority_actions if they exist
    if (actions.length > 0) {
      for (var ai2 = 0; ai2 < actions.length; ai2++) {
        var txt = typeof actions[ai2] === 'string' ? actions[ai2] : (actions[ai2].text || actions[ai2].description || actions[ai2].action || '');
        smartActions.push({ text: txt, border: '' });
      }
    } else {
      // Generate smart suggestions from the data
      if (ctaClicks === 0) {
        smartActions.push({
          text: '<strong>Your CTA buttons aren\'t getting clicks.</strong> Consider testing different button text, colors, or placement. Even moving a CTA above the fold can double click-through rates.',
          border: 'orange'
        });
      }

      if (!hasCitation) {
        smartActions.push({
          text: '<strong>Submit your site to AI answer engines.</strong> Update your <code>llms.txt</code> with fresh data, and make sure your FAQ schema is comprehensive. AI tools use structured data to build answers.',
          border: 'purple-border'
        });
      }

      if (freshnessTotal > 100) {
        smartActions.push({
          text: '<strong>Review pricing references across your pages</strong> &mdash; ' + commas(freshnessTotal) + ' content items need verification. Most are pricing mentions that may be outdated.',
          border: ''
        });
      }

      if (googleOrganic > 0 && kws.length === 0) {
        smartActions.push({
          text: '<strong>Connect Google Search Console</strong> to unlock keyword opportunity data. You\'re already getting ' + googleOrganic + ' organic visits &mdash; there are likely easy wins hiding in your search data.',
          border: 'blue-border'
        });
      }

      smartActions.push({
        text: '<strong>Run a fresh site audit</strong> (Ahrefs, Screaming Frog, or similar) to check for new technical SEO issues, broken links, and crawl errors.',
        border: 'green-border'
      });
    }

    html += '<div class="action-list">';
    for (var ac = 0; ac < smartActions.length; ac++) {
      var borderClass = smartActions[ac].border ? ' ' + smartActions[ac].border : '';
      html += '<div class="action-item' + borderClass + '"><span class="action-num">' + (ac + 1) + '.</span><span class="action-text">' + smartActions[ac].text + '</span></div>';
    }
    html += '</div>';
    html += '</div>';

    // ═══════════════════════════════════════
    // FOOTER
    // ═══════════════════════════════════════
    html += '<div class="dash-footer animate-in">';
    html += 'Reports auto-update every Monday &middot; Last updated: ' + esc(updated) + ' &middot; Dashboard by highlevel.ai SEO automation';
    html += '</div>';

    document.getElementById('dashboard').innerHTML = html;
    show('dashboard');

    // Wire up screenshot upload
    var fileInput = document.getElementById('earningsFileInput');
    var screenshotArea = document.getElementById('screenshotArea');
    if (screenshotArea && !screenshotArea._wired) {
      screenshotArea._wired = true;
      screenshotArea.addEventListener('click', function(e) {
        if (e.target.tagName === 'BUTTON') return;
        fileInput.click();
      });
      // Drag and drop
      screenshotArea.addEventListener('dragover', function(e) { e.preventDefault(); screenshotArea.style.borderColor = 'var(--accent-green)'; });
      screenshotArea.addEventListener('dragleave', function() { screenshotArea.style.borderColor = ''; });
      screenshotArea.addEventListener('drop', function(e) {
        e.preventDefault();
        screenshotArea.style.borderColor = '';
        if (e.dataTransfer.files && e.dataTransfer.files[0]) handleScreenshotFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener('change', function() {
        if (fileInput.files && fileInput.files[0]) handleScreenshotFile(fileInput.files[0]);
      });
    }

    // Draw trend charts
    drawLineChart('visitorsChart', dailyData.map(function(dd) { return dd.users; }), dailyData.map(function(dd) {
      var ds = String(dd.date);
      return ds.substring(4,6) + '/' + ds.substring(6,8);
    }), '#4f7df9');

    var earningsHist = [];
    try { earningsHist = JSON.parse(localStorage.getItem('hl_earnings_history') || '[]'); } catch(e) {}
    if (earningsHist.length > 1) {
      drawLineChart('earningsChart', earningsHist.map(function(h) { return h.earnings; }), earningsHist.map(function(h) { return h.label; }), '#34d399');
    }
  }

  function drawLineChart(canvasId, values, labels, color) {
    var canvas = document.getElementById(canvasId);
    if (!canvas || !values.length) return;
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(dpr, dpr);

    var w = rect.width, h = rect.height;
    var pad = { top: 10, right: 10, bottom: 24, left: 5 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;
    var maxVal = Math.max.apply(null, values) || 1;
    var minVal = Math.min.apply(null, values);
    var range = maxVal - minVal || 1;

    function x(i) { return pad.left + (i / (values.length - 1)) * cw; }
    function y(v) { return pad.top + ch - ((v - minVal) / range) * ch; }

    // Fill gradient
    ctx.beginPath();
    ctx.moveTo(x(0), y(values[0]));
    for (var i = 1; i < values.length; i++) ctx.lineTo(x(i), y(values[i]));
    ctx.lineTo(x(values.length - 1), h - pad.bottom);
    ctx.lineTo(x(0), h - pad.bottom);
    ctx.closePath();
    var grad = ctx.createLinearGradient(0, pad.top, 0, h - pad.bottom);
    grad.addColorStop(0, color + '33');
    grad.addColorStop(1, color + '05');
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(x(0), y(values[0]));
    for (var j = 1; j < values.length; j++) ctx.lineTo(x(j), y(values[j]));
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // X-axis labels (show ~5)
    ctx.fillStyle = '#64748b';
    ctx.font = '10px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    var step = Math.max(1, Math.floor(labels.length / 5));
    for (var k = 0; k < labels.length; k += step) {
      ctx.fillText(labels[k], x(k), h - 4);
    }
  }

  function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'toast ' + (type || 'success');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 4000);
  }

  function handleScreenshotFile(file) {
    if (!file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var dataUrl = e.target.result;
      localStorage.setItem('hl_earnings_img', dataUrl);
      localStorage.setItem('hl_earnings_date', new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}));

      // Show extraction spinner
      var area = document.getElementById('screenshotArea');
      if (area) {
        area.innerHTML = '<div class="extraction-status"><div class="extraction-spinner"></div> Extracting earnings data...</div>';
      }

      // Call extraction API
      fetch('/api/extract-earnings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: dataUrl })
      })
      .then(function(r) {
        if (!r.ok) throw new Error('API returned ' + r.status);
        return r.json();
      })
      .then(function(data) {
        if (data.totals) {
          localStorage.setItem('hl_earnings_data', JSON.stringify(data));
          var now = new Date();
          var dateLabel = now.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
          var fullDate = now.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'});
          localStorage.setItem('hl_earnings_extracted_at', fullDate);
          // Append to earnings history for trend chart
          var hist = [];
          try { hist = JSON.parse(localStorage.getItem('hl_earnings_history') || '[]'); } catch(e) {}
          // Only add one entry per day
          var todayKey = now.toISOString().substring(0, 10);
          hist = hist.filter(function(h) { return h.key !== todayKey; });
          hist.push({
            key: todayKey,
            label: dateLabel,
            earnings: data.totals.earnings,
            clicks: data.totals.clicks,
            customers: data.totals.customers
          });
          // Keep last 90 entries max
          if (hist.length > 90) hist = hist.slice(hist.length - 90);
          localStorage.setItem('hl_earnings_history', JSON.stringify(hist));
          showToast('Earnings data extracted: $' + data.totals.earnings.toFixed(2) + ' from ' + data.totals.customers + ' customer(s)', 'success');
        } else {
          showToast('Could not parse earnings from image', 'error');
        }
        // Re-render with extracted data
        fetch('dashboard-data.json').then(function(r){return r.json()}).then(renderDashboard).catch(function(){renderDashboard({})});
      })
      .catch(function(err) {
        console.error('Extraction failed:', err);
        showToast('Extraction failed — image saved as screenshot', 'error');
        // Still re-render to show the uploaded image
        fetch('dashboard-data.json').then(function(r){return r.json()}).then(renderDashboard).catch(function(){renderDashboard({})});
      });
    };
    reader.readAsDataURL(file);
  }

  window.removeScreenshot = function() {
    localStorage.removeItem('hl_earnings_img');
    localStorage.removeItem('hl_earnings_date');
    fetch('dashboard-data.json').then(function(r){return r.json()}).then(renderDashboard).catch(function(){renderDashboard({})});
  };

  window.saveManualEarnings = function() {
    var clicks = parseInt(document.getElementById('manualClicks').value) || 0;
    var signups = parseInt(document.getElementById('manualSignups').value) || 0;
    var customers = parseInt(document.getElementById('manualCustomers').value) || 0;
    var earnings = parseFloat(document.getElementById('manualEarnings').value) || 0;

    var data = {
      period: 'Manual entry',
      totals: { clicks: clicks, signups: signups, customers: customers, earnings: earnings },
      rows: []
    };
    localStorage.setItem('hl_earnings_data', JSON.stringify(data));

    var now = new Date();
    var dateLabel = now.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
    var fullDate = now.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'});
    localStorage.setItem('hl_earnings_extracted_at', fullDate);

    // Append to earnings history for trend chart
    var hist = [];
    try { hist = JSON.parse(localStorage.getItem('hl_earnings_history') || '[]'); } catch(e) {}
    var todayKey = now.toISOString().substring(0, 10);
    hist = hist.filter(function(h) { return h.key !== todayKey; });
    hist.push({ key: todayKey, label: dateLabel, earnings: earnings, clicks: clicks, customers: customers });
    if (hist.length > 90) hist = hist.slice(hist.length - 90);
    localStorage.setItem('hl_earnings_history', JSON.stringify(hist));

    showToast('Earnings updated: $' + earnings.toFixed(2), 'success');
    fetch('dashboard-data.json').then(function(r){return r.json()}).then(renderDashboard).catch(function(){renderDashboard({})});
  };

})();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard — highlevel.ai</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26A1;</text></svg>" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --card-bg: #12121a;
  --card-bg-hover: #181825;
  --accent-blue: #4f7df9;
  --accent-green: #34d399;
  --accent-orange: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #a855f7;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: rgba(255,255,255,0.06);
  --radius: 16px;
  --font-body: 'DM Sans', sans-serif;
  --font-heading: 'Sora', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Login Screen ── */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

.login-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.login-card h1 {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.login-card p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 28px;
}

.login-card input[type="password"] {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}

.login-card input[type="password"]:focus {
  border-color: var(--accent-blue);
}

.login-card button {
  width: 100%;
  padding: 14px;
  background: var(--accent-blue);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.login-card button:hover { opacity: 0.9; }

.login-error {
  color: var(--accent-red);
  font-size: 0.85rem;
  margin-top: 12px;
  min-height: 20px;
}

/* ── Loading ── */
#loading-screen {
  display: none;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  flex-direction: column;
  gap: 16px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loading-screen p {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* ── Dashboard ── */
#dashboard {
  display: none;
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

/* Header */
.dash-header {
  margin-bottom: 36px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.dash-header h1 {
  font-family: var(--font-heading);
  font-size: 1.75rem;
  font-weight: 700;
}

.dash-header .last-updated {
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* ── Earnings (THE scoreboard) ── */
.earnings-section {
  background: linear-gradient(135deg, #0f1a0f 0%, #12121a 50%, #1a0f1a 100%);
  border: 1px solid rgba(52, 211, 153, 0.2);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.earnings-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
}

.earnings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.earnings-title {
  font-family: var(--font-heading);
  font-size: 1.3rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

.earnings-title .money-icon {
  font-size: 1.5rem;
}

.earnings-badge {
  background: rgba(52, 211, 153, 0.15);
  color: var(--accent-green);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
}

/* ── Funnel ── */
.funnel-row {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 24px;
  overflow-x: auto;
}

.funnel-step {
  flex: 1;
  text-align: center;
  padding: 16px 8px;
  position: relative;
  min-width: 100px;
}

.funnel-step .funnel-val {
  font-family: var(--font-heading);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-primary);
}

.funnel-step .funnel-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-top: 2px;
}

.funnel-arrow {
  color: var(--text-muted);
  font-size: 1.2rem;
  flex-shrink: 0;
  padding: 0 2px;
}

.funnel-rate {
  font-size: 0.65rem;
  color: var(--accent-blue);
  margin-top: 4px;
}

@media (max-width: 600px) {
  .funnel-row { flex-wrap: wrap; }
  .funnel-step { min-width: 80px; flex-basis: 30%; }
  .funnel-arrow { display: none; }
}

/* ── Lead Pipeline ── */
.pipeline-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  margin-top: 12px;
}

.pipeline-table th {
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.pipeline-table td {
  padding: 8px 12px;
  color: var(--text-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.pipeline-table td:first-child { color: var(--text-primary); }

.status-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 500;
}

.status-badge.customer { background: rgba(52,211,153,0.15); color: var(--accent-green); }
.status-badge.lead { background: rgba(79,125,249,0.15); color: var(--accent-blue); }
.status-badge.cancelled { background: rgba(239,68,68,0.15); color: var(--accent-red); }

.lead-form-area {
  margin-top: 16px;
}

.lead-form-area summary {
  color: var(--text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  user-select: none;
}

.lead-form-area summary:hover { color: var(--text-primary); }

.lead-textarea {
  width: 100%;
  min-height: 100px;
  margin-top: 10px;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.85rem;
  resize: vertical;
  outline: none;
}

.lead-textarea:focus { border-color: var(--accent-blue); }
.lead-textarea::placeholder { color: var(--text-muted); }

.lead-save-btn {
  margin-top: 10px;
  padding: 8px 20px;
  background: var(--accent-green);
  color: #000;
  border: none;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}

.lead-save-btn:hover { opacity: 0.85; }

.lead-hint {
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-top: 6px;
}

.earnings-big-number {
  font-family: var(--font-heading);
  font-size: 3rem;
  font-weight: 700;
  color: var(--accent-green);
  margin-bottom: 4px;
  line-height: 1.1;
}

.earnings-sub {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.screenshot-area {
  border: 2px dashed rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.screenshot-area:hover {
  border-color: var(--accent-blue);
  background: rgba(79, 125, 249, 0.05);
}

.screenshot-area.has-image {
  border-style: solid;
  border-color: rgba(255,255,255,0.08);
  padding: 12px;
}

.screenshot-area img {
  max-width: 100%;
  border-radius: 8px;
}

.screenshot-placeholder {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.screenshot-placeholder .upload-icon {
  font-size: 2rem;
  display: block;
  margin-bottom: 8px;
}

.screenshot-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 12px;
}

.screenshot-actions button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  padding: 6px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: var(--font-body);
  transition: all 0.2s;
}

.screenshot-actions button:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text-primary);
}

.screenshot-actions button.remove-btn:hover {
  border-color: var(--accent-red);
  color: var(--accent-red);
}

.screenshot-date {
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-top: 8px;
}

.earnings-file-input {
  display: none;
}

.extraction-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px;
  color: var(--accent-blue);
  font-size: 0.9rem;
}

.extraction-spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(79,125,249,0.3);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.earnings-breakdown {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
  font-size: 0.85rem;
}

.earnings-breakdown th {
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  padding: 8px 12px;
  text-align: right;
  border-bottom: 1px solid var(--border);
}

.earnings-breakdown th:first-child { text-align: left; }

.earnings-breakdown td {
  padding: 7px 12px;
  text-align: right;
  color: var(--text-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.earnings-breakdown td:first-child {
  text-align: left;
  color: var(--text-primary);
}

.earnings-breakdown td.has-value {
  color: var(--accent-green);
  font-weight: 600;
}

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 0.85rem;
  z-index: 9999;
  animation: fadeUp 0.3s;
  max-width: 360px;
}

.toast.success { background: rgba(52,211,153,0.15); border: 1px solid var(--accent-green); color: var(--accent-green); }
.toast.error { background: rgba(239,68,68,0.15); border: 1px solid var(--accent-red); color: var(--accent-red); }

.earnings-extracted-date {
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-top: 4px;
}

.manual-entry {
  margin-top: 16px;
  padding: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.manual-entry summary {
  color: var(--text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  user-select: none;
}

.manual-entry summary:hover { color: var(--text-primary); }

.manual-entry-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 12px;
}

@media (max-width: 600px) { .manual-entry-grid { grid-template-columns: repeat(2, 1fr); } }

.manual-entry-grid label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  display: block;
  margin-bottom: 4px;
}

.manual-entry-grid input {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
}

.manual-entry-grid input:focus { border-color: var(--accent-blue); }

.manual-save-btn {
  margin-top: 12px;
  padding: 8px 20px;
  background: var(--accent-green);
  color: #000;
  border: none;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.manual-save-btn:hover { opacity: 0.85; }

/* ── Trend Charts ── */
.trends-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 24px;
}

@media (max-width: 768px) {
  .trends-section { grid-template-columns: 1fr; }
}

.trend-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

.trend-card h3 {
  font-family: var(--font-heading);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.trend-card .trend-value {
  font-family: var(--font-heading);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 16px;
}

.trend-card .trend-value .trend-delta {
  font-size: 0.8rem;
  font-weight: 500;
  margin-left: 8px;
}

.trend-delta.up { color: var(--accent-green); }
.trend-delta.down { color: var(--accent-red); }

.trend-chart-wrap {
  position: relative;
  height: 120px;
}

@media (max-width: 600px) {
  .earnings-stats-row { grid-template-columns: repeat(2, 1fr); }
  .earnings-big-number { font-size: 2.2rem; }
}

/* ── Hero Stats ── */
.hero-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 36px;
}

.hero-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}

.hero-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.hero-card .hero-icon {
  font-size: 1.6rem;
  margin-bottom: 12px;
  display: block;
}

.hero-card .hero-value {
  font-family: var(--font-heading);
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 4px;
}

.hero-card .hero-label {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.hero-card .hero-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
}

/* Colored top borders on hero cards */
.hero-card.blue { border-top: 3px solid var(--accent-blue); }
.hero-card.blue .hero-value { color: var(--accent-blue); }
.hero-card.green { border-top: 3px solid var(--accent-green); }
.hero-card.green .hero-value { color: var(--accent-green); }
.hero-card.purple { border-top: 3px solid var(--accent-purple); }
.hero-card.purple .hero-value { color: var(--accent-purple); }
.hero-card.orange { border-top: 3px solid var(--accent-orange); }
.hero-card.orange .hero-value { color: var(--accent-orange); }

/* Subtle glow background */
.hero-card::after {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  opacity: 0.06;
  pointer-events: none;
}
.hero-card.blue::after { background: var(--accent-blue); }
.hero-card.green::after { background: var(--accent-green); }
.hero-card.purple::after { background: var(--accent-purple); }
.hero-card.orange::after { background: var(--accent-orange); }

/* ── Section Cards ── */
.dash-section {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 24px;
}

.dash-section h2 {
  font-family: var(--font-heading);
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.icon-green { background: rgba(52,211,153,0.15); }
.icon-blue { background: rgba(79,125,249,0.15); }
.icon-purple { background: rgba(168,85,247,0.15); }
.icon-orange { background: rgba(245,158,11,0.15); }

/* ── Traffic Sources Bar Chart ── */
.sources-chart {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.source-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.source-label {
  width: 110px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  text-align: right;
  flex-shrink: 0;
}

.source-bar-wrap {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border-radius: 6px;
  height: 28px;
  position: relative;
  overflow: hidden;
}

.source-bar {
  height: 100%;
  border-radius: 6px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  transition: width 0.6s ease;
  min-width: 0;
}

.source-bar span {
  font-size: 0.75rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.source-count {
  width: 70px;
  text-align: right;
  font-size: 0.85rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* Stacked bar */
.stacked-bar-wrap {
  width: 100%;
  height: 32px;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  margin-bottom: 16px;
}

.stacked-seg {
  height: 100%;
  transition: width 0.5s ease;
  min-width: 0;
}

.stacked-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 24px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── Delta Badges ── */
.delta-badge {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 8px;
  vertical-align: middle;
}
.delta-badge.up { background: rgba(52,211,153,0.15); color: var(--accent-green); }
.delta-badge.down { background: rgba(239,68,68,0.15); color: var(--accent-red); }

/* ── System Activity ── */
.system-activity {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.system-activity-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.88rem;
  color: var(--text-secondary);
}
.system-activity-item .check-icon {
  color: var(--accent-green);
  font-size: 1rem;
  flex-shrink: 0;
}
.system-activity-item .activity-time {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 0.75rem;
  white-space: nowrap;
}

<div id="dashboard"></div>

<script>
(function() {
  'use strict';

  var HASH = '20779ca4e9489d7b0a80076f0f79aa5ddbb2f3b322eb43355687d12c9f53c19c';
  var AUTH_KEY = 'seo_dash_auth';
  var PW_KEY = 'seo_dash_pw';
  var activeTab = 'overview';
  var dashboardData = null;
  var videoQueueData = null;

  // ── Utility ──
  function esc(str) {
    if (str == null) return '';
    var d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function num(v) { return typeof v === 'number' ? v : 0; }

  function commas(n) {
    return n != null ? Number(n).toLocaleString() : '0';
  }

  async function sha256(text) {
    var encoded = new TextEncoder().encode(text);
    var buf = await crypto.subtle.digest('SHA-256', encoded);
    return Array.from(new Uint8Array(buf)).map(function(b) {
      return b.toString(16).padStart(2, '0');
    }).join('');
  }

  function show(id) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'none';
    var el = document.getElementById(id);
    if (el) el.style.display = (id === 'login-screen' || id === 'loading-screen') ? 'flex' : 'block';
  }

  // ── Auth ──
  async function attemptLogin(pw) {
    var hash = await sha256(pw);
    if (hash === HASH) {
      sessionStorage.setItem(AUTH_KEY, '1');
      sessionStorage.setItem(PW_KEY, pw);
      loadData();
    } else {
      document.getElementById('pw-error').textContent = 'Wrong password';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  document.getElementById('pw-btn').addEventListener('click', function() {
    var pw = document.getElementById('pw-input').value;
    if (pw) attemptLogin(pw);
  });

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var pw = this.value;
      if (pw) attemptLogin(pw);
    }
    document.getElementById('pw-error').textContent = '';
  });

  // ── Check session ──
  if (sessionStorage.getItem(AUTH_KEY) === '1') {
    loadData();
  }

  // ── Load Data ──
  function loadData() {
    show('loading-screen');
    var dashPromise = fetch('dashboard-data.json').then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    });
    var videoPromise = fetch('video_queue.json').then(function(r) {
      if (!r.ok) return { videos: [] };
      return r.json();
    }).catch(function() { return { videos: [] }; });

    Promise.all([dashPromise, videoPromise])
      .then(function(results) {
        dashboardData = results[0];
        videoQueueData = results[1];
        renderWithTabs();
      })
      .catch(function() {
        dashboardData = {};
        videoQueueData = { videos: [] };
        renderWithTabs();
      });
  }

  function renderWithTabs() {
    var tabBarHtml = '<div class="tab-bar">';
    tabBarHtml += '<button class="tab-btn' + (activeTab === 'overview' ? ' active' : '') + '" onclick="switchTab(\'overview\')">Overview</button>';
    tabBarHtml += '<button class="tab-btn' + (activeTab === 'videos' ? ' active' : '') + '" onclick="switchTab(\'videos\')">Videos</button>';
    tabBarHtml += '</div>';
    tabBarHtml += '<div id="tab-overview" class="tab-content' + (activeTab === 'overview' ? ' active' : '') + '"></div>';
    tabBarHtml += '<div id="tab-videos" class="tab-content' + (activeTab === 'videos' ? ' active' : '') + '"></div>';

    document.getElementById('dashboard').innerHTML = tabBarHtml;
    show('dashboard');

    renderDashboardInto(dashboardData);
    renderVideoTab(videoQueueData);
  }

  window.switchTab = function(tab) {
    activeTab = tab;
    var btns = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('active', btns[i].textContent.toLowerCase() === tab);
    }
    var contents = document.querySelectorAll('.tab-content');
    for (var j = 0; j < contents.length; j++) {
      contents[j].classList.toggle('active', contents[j].id === 'tab-' + tab);
    }
  };

  // ── Helper: find source sessions ──
  function findSource(sources, sourceName, medium) {
    if (!sources || !sources.length) return 0;
    var total = 0;
    for (var i = 0; i < sources.length; i++) {
      var s = sources[i];
      var sName = (s.source || '').toLowerCase();
      var sMed = (s.medium || '').toLowerCase();
      if (medium) {
        if (sName.indexOf(sourceName) !== -1 && sMed === medium) total += num(s.sessions);
      } else {
        if (sName.indexOf(sourceName) !== -1) total += num(s.sessions);
      }
    }
    return total;
  }

  // ── Render ──
  function renderDashboardInto(d) {
    var html = '';
    var traffic = d.traffic || {};
    var sources = traffic.sources || [];
    var stats = d.stats || {};
    var freshData = d.freshness || {};
    var schemaData = d.schema || {};
    var kwData = d.keywords || {};
    var llmData = d.llm_visibility || {};
    var actions = d.priority_actions || [];

    var totalUsers = num(traffic.users);
    var totalSessions = num(traffic.sessions);

    // Extract key sources
    var googleOrganic = findSource(sources, 'google', 'organic');
    var chatgptSessions = findSource(sources, 'chatgpt');
    var perplexitySessions = findSource(sources, 'perplexity');
    var aiTotal = chatgptSessions + perplexitySessions;
    var ctaClicks = num(traffic.cta_clicks);
    var directSessions = findSource(sources, 'direct');
    var bingSessions = findSource(sources, 'bing');
    var facebookSessions = findSource(sources, 'facebook');
    var quoraSessions = findSource(sources, 'quora');
    var socialSessions = facebookSessions + quoraSessions;

    var updated = d.generated_at || 'Unknown';

    // Header
    html += '<div class="dash-header">';
    html += '<h1>highlevel.ai Dashboard</h1>';
    html += '<div class="last-updated">Updated ' + esc(updated) + '</div>';
    html += '</div>';

    // ═══════════════════════════════════════
    // 0. CONVERSION FUNNEL & LEAD PIPELINE
    // ═══════════════════════════════════════
    var leads = [];
    try { leads = JSON.parse(localStorage.getItem('hl_leads') || '[]'); } catch(e) {}
    var leadCount = leads.filter(function(l) { return l.status === 'Lead'; }).length;
    var customerCount = leads.filter(function(l) { return l.status === 'Customer'; }).length;
    var cancelledCount = leads.filter(function(l) { return l.status === 'Cancelled'; }).length;
    var totalReferrals = leads.length;
    var earningsPerCustomer = 38.80;
    var totalEarnings = customerCount * earningsPerCustomer;

    html += '<div class="earnings-section animate-in">';

      // Find top CTA page — homepage gets most clicks
      var topCtaPage = 'homepage';
      html += 'Your ' + esc(topCtaPage) + ' got <strong>' + commas(ctaClicks) + '</strong> of ' + commas(ctaClicks) + ' affiliate clicks &mdash; it\'s your money page.';
    } else if (kws.length > 0) {
      // Find striking distance keyword with impressions but few clicks
      var insightKw = kws[0];
      for (var ik = 0; ik < kws.length; ik++) {
        if (num(kws[ik].impressions) > 50 && num(kws[ik].clicks) <= 1) { insightKw = kws[ik]; break; }
      }
      html += '<strong>' + esc(insightKw.keyword) + '</strong> has ' + commas(insightKw.impressions) + ' impressions but only ' + commas(insightKw.clicks) + ' click' + (num(insightKw.clicks) !== 1 ? 's' : '') + ' &mdash; people see you but don\'t click.';
    } else {
      var sourceCount = sources.length;
      html += 'You have <strong>' + commas(totalUsers) + '</strong> visitors this month from <strong>' + sourceCount + '</strong> different sources &mdash; keep building!';
    }
    html += '</div>';

    // ═══════════════════════════════════════
    // FOOTER
    // ═══════════════════════════════════════
    html += '<div class="dash-footer animate-in">';
    html += 'Reports auto-update every Monday &middot; Last updated: ' + esc(updated) + ' &middot; Dashboard by highlevel.ai SEO automation';
    html += '</div>';

    var overviewEl = document.getElementById('tab-overview');
    if (overviewEl) overviewEl.innerHTML = html;

    // Wire up CSV upload
    var csvInput = document.getElementById('csvFileInput');
    var csvArea = document.getElementById('csvDropArea');
    if (csvArea && !csvArea._wired) {
      csvArea._wired = true;
      csvArea.addEventListener('click', function() { csvInput.click(); });
      csvArea.addEventListener('dragover', function(e) { e.preventDefault(); csvArea.style.borderColor = 'var(--accent-green)'; });
      csvArea.addEventListener('dragleave', function() { csvArea.style.borderColor = ''; });
      csvArea.addEventListener('drop', function(e) {
        e.preventDefault();
        csvArea.style.borderColor = '';
        if (e.dataTransfer.files && e.dataTransfer.files[0]) handleCsvFile(e.dataTransfer.files[0]);
      });
      csvInput.addEventListener('change', function() {
        if (csvInput.files && csvInput.files[0]) handleCsvFile(csvInput.files[0]);
      });
    }

    // Draw trend charts
    drawLineChart('visitorsChart', dailyArr.map(function(dd) { return dd.users; }), dailyArr.map(function(dd) {
      var ds = String(dd.date);
      return ds.substring(4,6) + '/' + ds.substring(6,8);
    }), '#4f7df9');

    // (Pipeline chart removed — replaced by CTA Clicks card)
  }

  // ── Video Tab ──
  function renderVideoTab(data) {
    var videos = (data && data.videos) || [];
    var pending = videos.filter(function(v) { return v.status === 'pending'; });
    var complete = videos.filter(function(v) { return v.status === 'complete'; });

    // Sort: newest first within each group
    pending.sort(function(a, b) { return b.created_date > a.created_date ? 1 : -1; });
    complete.sort(function(a, b) { return (b.completed_date || b.created_date) > (a.completed_date || a.created_date) ? 1 : -1; });

    var sorted = pending.concat(complete);

    var html = '';

    // Header bar
    html += '<div class="video-header-bar">';
    html += '<div class="video-pending-count"><span>' + pending.length + '</span> video' + (pending.length !== 1 ? 's' : '') + ' pending</div>';
    html += '<div class="video-header-links">';
    html += '<a href="https://github.com/realestateinvestorceo/highlevel-ai/edit/main/site/data/notebooklm_prompt.txt" target="_blank">Edit prompt template</a>';
    html += '</div>';
    html += '</div>';

    html += '<div class="video-note">Videos run daily at 6:30am UTC. New topics appear here automatically.</div>';

    if (sorted.length === 0) {
      html += '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">';
      html += '<div style="font-size:2rem;margin-bottom:12px;">&#127909;</div>';
      html += '<p>No videos in the queue yet. The daily pipeline will add topics automatically.</p>';
      html += '</div>';
    }

    for (var i = 0; i < sorted.length; i++) {
      var v = sorted[i];
      var isComplete = v.status === 'complete';
      var cardId = 'vc-' + i;

      html += '<div class="video-card">';

      // Header: title + badge
      html += '<div class="video-card-header">';
      html += '<div>';
      html += '<div class="video-card-title">' + esc(v.topic) + '</div>';
      html += '<div class="video-date">' + esc(v.created_date) + (v.page_url ? ' &middot; ' + esc(v.page_url) : '') + '</div>';
      html += '</div>';
      html += '<div class="video-status ' + (isComplete ? 'complete' : 'pending') + '">' + (isComplete ? 'Complete' : 'Pending') + '</div>';
      html += '</div>';

      // Thumbnail
      if (v.thumbnail_path) {
        html += '<div class="video-thumbnail-wrap">';
        html += '<img src="' + esc(v.thumbnail_path) + '" alt="Thumbnail for ' + esc(v.topic) + '" loading="lazy">';
        html += '<div class="video-thumbnail-actions">';
        html += '<a href="' + esc(v.thumbnail_path) + '" download="' + esc(v.id) + '.jpg">Download thumbnail</a>';
        html += '</div>';
        html += '</div>';
      }

      // Source URLs
      if (v.source_urls && v.source_urls.length > 0) {
        html += '<button class="video-section-toggle" onclick="toggleVideoSection(\'' + cardId + '-urls\')">';
        html += '<span class="arrow">&#9654;</span> Source URLs (' + v.source_urls.length + ')';
        html += '</button>';
        html += '<div class="video-collapsible" id="' + cardId + '-urls">';
        html += '<button class="copy-btn" onclick="copyToClipboard(\'' + escAttr(v.source_urls.join('\n')) + '\', \'URLs\')">Copy all URLs</button>';
        html += '<ul class="video-source-urls" style="margin-top:8px;">';
        for (var u = 0; u < v.source_urls.length; u++) {
          html += '<li><a href="' + esc(v.source_urls[u]) + '" target="_blank">' + esc(v.source_urls[u]) + '</a></li>';
        }
        html += '</ul>';
        html += '</div>';
      }

      // NotebookLM Prompt
      if (v.notebooklm_prompt) {
        html += '<button class="video-section-toggle" onclick="toggleVideoSection(\'' + cardId + '-prompt\')">';
        html += '<span class="arrow">&#9654;</span> NotebookLM Prompt';
        html += '</button>';
        html += '<div class="video-collapsible" id="' + cardId + '-prompt">';
        html += '<button class="copy-btn" onclick="copyVideoPrompt(\'' + cardId + '\')">Copy prompt</button>';
        html += '<div class="video-prompt-box" id="' + cardId + '-prompt-text">' + esc(v.notebooklm_prompt) + '</div>';
        html += '</div>';
      }

      // Research Summary
      if (v.research_summary) {
        html += '<button class="video-section-toggle" onclick="toggleVideoSection(\'' + cardId + '-research\')">';
        html += '<span class="arrow">&#9654;</span> Research Summary';
        html += '</button>';
        html += '<div class="video-collapsible" id="' + cardId + '-research">';
        html += '<div class="video-prompt-box">' + esc(v.research_summary) + '</div>';
        html += '</div>';
      }

      // YouTube URL / Mark Complete
      html += '<div class="video-complete-row">';
      if (isComplete && v.youtube_url) {
        html += '<a class="video-yt-link" href="' + esc(v.youtube_url) + '" target="_blank">' + esc(v.youtube_url) + '</a>';
        if (v.completed_date) {
          html += '<span style="color:var(--text-muted);font-size:0.8rem;">Completed ' + esc(v.completed_date) + '</span>';
        }
      } else {
        html += '<input type="text" class="video-yt-input" id="' + cardId + '-yt" placeholder="Paste YouTube URL here...">';
        html += '<button class="mark-complete-btn" onclick="markVideoComplete(\'' + esc(v.id) + '\', \'' + cardId + '-yt\')">Mark Complete</button>';
      }
      html += '</div>';

      html += '</div>'; // .video-card
    }

    var videosEl = document.getElementById('tab-videos');
    if (videosEl) videosEl.innerHTML = html;
  }

  function escAttr(str) {
    return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
  }

  window.toggleVideoSection = function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var isOpen = el.classList.toggle('open');
    var btn = el.previousElementSibling;
    if (btn) btn.classList.toggle('open', isOpen);
  };

  window.copyToClipboard = function(text, label) {
    // Unescape the newlines
    text = text.replace(/\\n/g, '\n');
    navigator.clipboard.writeText(text).then(function() {
      showToast((label || 'Text') + ' copied to clipboard');
    }).catch(function() {
      showToast('Failed to copy', 'error');
    });
  };

  window.copyVideoPrompt = function(cardId) {
    var el = document.getElementById(cardId + '-prompt-text');
    if (!el) return;
    navigator.clipboard.writeText(el.textContent).then(function() {
      showToast('Prompt copied to clipboard');
    }).catch(function() {
      showToast('Failed to copy', 'error');
    });
  };

  window.markVideoComplete = function(videoId, inputId) {
    var input = document.getElementById(inputId);
    if (!input) return;
    var url = input.value.trim();
    if (!url) { showToast('Please paste a YouTube URL first', 'error'); return; }
    if (url.indexOf('youtube.com') === -1 && url.indexOf('youtu.be') === -1) {
      showToast('Please enter a valid YouTube URL', 'error'); return;
    }

    var pw = sessionStorage.getItem(PW_KEY);
    if (!pw) { showToast('Session expired — please refresh and log in again', 'error'); return; }

    var btn = input.nextElementSibling;
    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
    input.disabled = true;

    fetch('/api/update-video', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video_id: videoId, youtube_url: url, password: pw })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        showToast('Video marked complete!');
        // Reload video queue after a brief delay (Vercel rebuild takes a moment)
        setTimeout(function() {
          fetch('video_queue.json').then(function(r) { return r.json(); }).then(function(q) {
            videoQueueData = q;
            renderVideoTab(q);
          }).catch(function() {});
        }, 2000);
      } else {
        showToast('Error: ' + (data.error || 'Unknown error'), 'error');
        if (btn) { btn.disabled = false; btn.textContent = 'Mark Complete'; }
        input.disabled = false;
      }
    })
    .catch(function(err) {
      showToast('Network error: ' + err.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Mark Complete'; }
      input.disabled = false;
    });
  };

  function drawLineChart(canvasId, values, labels, color) {
    var canvas = document.getElementById(canvasId);
    if (!canvas || !values.length) return;
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(dpr, dpr);

    var w = rect.width, h = rect.height;
    var pad = { top: 10, right: 10, bottom: 24, left: 5 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;
    var maxVal = Math.max.apply(null, values) || 1;
    var minVal = Math.min.apply(null, values);
    var range = maxVal - minVal || 1;

    function x(i) { return pad.left + (i / (values.length - 1)) * cw; }
    function y(v) { return pad.top + ch - ((v - minVal) / range) * ch; }

    // Fill gradient
    ctx.beginPath();
    ctx.moveTo(x(0), y(values[0]));
    for (var i = 1; i < values.length; i++) ctx.lineTo(x(i), y(values[i]));
    ctx.lineTo(x(values.length - 1), h - pad.bottom);
    ctx.lineTo(x(0), h - pad.bottom);
    ctx.closePath();
    var grad = ctx.createLinearGradient(0, pad.top, 0, h - pad.bottom);
    grad.addColorStop(0, color + '33');
    grad.addColorStop(1, color + '05');
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(x(0), y(values[0]));
    for (var j = 1; j < values.length; j++) ctx.lineTo(x(j), y(values[j]));
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // X-axis labels (show ~5)
    ctx.fillStyle = '#64748b';
    ctx.font = '10px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    var step = Math.max(1, Math.floor(labels.length / 5));
    for (var k = 0; k < labels.length; k += step) {
      ctx.fillText(labels[k], x(k), h - 4);
    }
  }

  function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'toast ' + (type || 'success');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 4000);
  }

  function handleCsvFile(file) {
    if (!file.name.endsWith('.csv')) { showToast('Please upload a .csv file', 'error'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var text = e.target.result;
      parseCsvAndSave(text);
    };
    reader.readAsText(file);
  }

  function parseCsvAndSave(text) {
    var lines = text.trim().split('\n');
    if (lines.length < 2) { showToast('CSV appears empty', 'error'); return; }

    var header = lines[0].split(',').map(function(h) { return h.trim().toLowerCase(); });
    var stateIdx = header.indexOf('state');
    var emailIdx = header.indexOf('email');
    var createdIdx = header.indexOf('created_at');
    var customerSinceIdx = header.indexOf('customer_since');

    if (stateIdx === -1 || emailIdx === -1) {
      showToast('CSV must have "state" and "email" columns', 'error');
      return;
    }

    var cutoff = new Date('2026-02-01T00:00:00Z');
    var leads = [];
    var stateMap = { 'active': 'Customer', 'subscribed': 'Lead', 'signup': 'Lead', 'cancelled': 'Cancelled' };

    for (var i = 1; i < lines.length; i++) {
      var cols = lines[i].split(',').map(function(c) { return c.trim(); });
      if (cols.length < header.length) continue;

      var createdStr = createdIdx >= 0 ? cols[createdIdx] : '';
      var created = createdStr ? new Date(createdStr) : null;

      // Filter out pre-Feb 2026
      if (created && created < cutoff) continue;

      var rawState = (cols[stateIdx] || '').toLowerCase();
      var status = stateMap[rawState] || 'Lead';
      var email = cols[emailIdx] || '';
      var customerSince = customerSinceIdx >= 0 ? cols[customerSinceIdx] : '';

      // Format created date nicely
      var createdLabel = '';
      if (created) {
        createdLabel = created.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
      }

      // Name from email (before @)
      var name = email.split('@')[0] || email;

      leads.push({
        email: email,
        name: name,
        created: createdLabel,
        created_at: createdStr,
        customer_since: customerSince,
        status: status
      });
    }

    if (leads.length === 0) {
      showToast('No referrals found after Feb 2026', 'error');
      return;
    }

    localStorage.setItem('hl_leads', JSON.stringify(leads));

    // Update pipeline history
    var now = new Date();
    var todayKey = now.toISOString().substring(0, 10);
    var dateLabel = now.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
    var customerCount = leads.filter(function(l) { return l.status === 'Customer'; }).length;
    var leadCount = leads.filter(function(l) { return l.status === 'Lead'; }).length;

    var hist = [];
    try { hist = JSON.parse(localStorage.getItem('hl_pipeline_history') || '[]'); } catch(e) {}
    hist = hist.filter(function(h) { return h.key !== todayKey; });
    hist.push({ key: todayKey, label: dateLabel, customers: customerCount, leads: leadCount, total: leads.length });
    if (hist.length > 90) hist = hist.slice(hist.length - 90);
    localStorage.setItem('hl_pipeline_history', JSON.stringify(hist));

    showToast(leads.length + ' referrals imported: ' + customerCount + ' customers, ' + leadCount + ' leads', 'success');
    fetch('dashboard-data.json').then(function(r){return r.json()}).then(function(d){dashboardData=d;renderDashboardInto(d);}).catch(function(){renderDashboardInto({})});
  }

  window.removeScreenshot = function() {
    localStorage.removeItem('hl_earnings_img');
    localStorage.removeItem('hl_earnings_date');
    fetch('dashboard-data.json').then(function(r){return r.json()}).then(function(d){dashboardData=d;renderDashboardInto(d);}).catch(function(){renderDashboardInto({})});
  };

  // saveLeadData removed — replaced by CSV upload via handleCsvFile

})();
</script>
